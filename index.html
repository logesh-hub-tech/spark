
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> APEC College</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:380px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 20px rgba(255,255,255,0.15);
}

.logo{
    width:100px;
    margin-bottom:15px;
}

h1{
    color:#0d6efd;
    margin-bottom:5px;
}

h3{
    color:#555;
    margin-bottom:20px;
    font-weight:normal;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#0d6efd;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0b5ed7;
}
</style>
</head>

<body>

<div class="container">

    <img src="logo.png" alt="APEC College Logo" class="logo">

    <h1>Welcome</h1>
    <h3>Welcome to APEC College</h3>

    <form action="https://cseboys652-code.github.io/tobi./" method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <!-- UI only: this field is NOT submitted -->
        <input
            type="password"
            placeholder="Password"
            required
        >

        <button type="submit">Submit</button>

    </form>

</div>

</body>
</html>
